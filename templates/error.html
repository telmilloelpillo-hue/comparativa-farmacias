<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error · Comparativa de Farmacias</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .header-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #2c3e50;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-bar .dot-z { width: 10px; height: 10px; border-radius: 50%; background: #c0392b; }
    .header-bar .dot-b { width: 10px; height: 10px; border-radius: 50%; background: #1a6fa8; }
    .header-bar span {
      color: white;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      background: #fdecea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }

    h2 {
      font-size: 20px;
      color: #2c3e50;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .labs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
    }

    .lab-badge {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .lab-badge.one { background: #fdecea; color: #c0392b; }
    .lab-badge.two { background: #e8f3fb; color: #1a6fa8; }

    .vs {
      font-size: 11px;
      font-weight: 700;
      color: #aaa;
      letter-spacing: 1px;
    }

    p {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    a {
      display: inline-block;
      background: #2c3e50;
      color: white;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    a:hover { background: #1a2332; }
  </style>
</head>
<body>

  <div class="header-bar">
    <div class="dot-z"></div>
    <div class="dot-b"></div>
    <span>Comparativa de Farmacias</span>
  </div>

  <div class="card">
    <div class="icon">⚠️</div>
    <h2>PDFs de laboratorios distintos</h2>

    <div class="labs">
      <span class="lab-badge one">{{ lab1 }}</span>
      <span class="vs">VS</span>
      <span class="lab-badge two">{{ lab2 }}</span>
    </div>

    <p>Los dos archivos pertenecen a laboratorios diferentes.<br>
    Para generar una comparativa, sube dos PDFs del <strong>mismo laboratorio</strong>.</p>

    <a href="/">← Volver e intentarlo de nuevo</a>
  </div>

</body>
</html>
