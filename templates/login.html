<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso · Farmacias Barris &amp; Zarzuelo</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/monogram.svg') }}">
</head>
<body>
<div class="login-stage">
  <div class="login-card">
    <div class="logo">
      <img src="{{ url_for('static', filename='img/monogram.svg') }}" alt="">
    </div>
    <h1>Farmacias Barris &amp; Zarzuelo</h1>
    <p class="lead">Herramienta interna · introduce la contraseña</p>

    {% if error %}
    <div class="alert danger" style="margin-bottom:16px;text-align:left">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <div class="field-label">Contraseña</div>
        <input type="password" id="password" name="password" placeholder="••••••••" autofocus>
      </div>
      <button class="btn btn-primary" type="submit">Entrar</button>
    </form>

    <div class="foot">Sólo personal autorizado · Sesión de 8 h</div>
  </div>
</div>
</body>
</html>
