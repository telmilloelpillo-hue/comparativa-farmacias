<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso · Comparativa de Farmacias</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a2332;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 22px;
      color: #2c3e50;
      font-weight: 700;
    }
    .logo p {
      color: #888;
      font-size: 13px;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #2c3e50;
    }
    button {
      width: 100%;
      padding: 13px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.2s;
    }
    button:hover { background: #1a2332; }
    .error {
      background: #fdecea;
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      border-left: 3px solid #c0392b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>Comparativa de Farmacias</h1>
      <p>Acceso restringido</p>
    </div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="Introduce la contraseña" autofocus>
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
