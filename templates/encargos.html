<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Encargos · Farmacias Barris &amp; Zarzuelo</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/monogram.svg') }}">
  <style>
    body {
      height: 100vh; height: 100dvh;
      overflow: hidden; position: fixed; width: 100%;
    }
    .app-shell { height: 100%; display: flex; flex-direction: column; }

    /* Views that scroll independently */
    #listView, #detailView {
      flex: 1; overflow-y: auto; min-height: 0;
    }

    /* Table row status cells */
    .encargo-units { font-size: 12px; color: var(--fg-muted); white-space: nowrap; flex-shrink: 0; }
    .enc-pdf-btn {
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
      color: var(--brand-700); border: 1px solid var(--brand-700); border-radius: 4px;
      padding: 2px 8px; text-decoration: none; white-space: nowrap; flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .enc-pdf-btn:hover { background: var(--brand-700); color: #fff; }

    /* Empty state for list */
    .enc-empty-state {
      text-align: center; padding: 4rem 1.5rem;
      font-size: 14px; color: var(--fg-muted); line-height: 1.7;
    }
    .enc-empty-state strong { display: block; font-size: 15px; color: var(--fg-1); margin-bottom: 6px; }

    /* ── DETAIL VIEW ── */
    .detail-wrap { padding: 20px 24px 32px; }
    .detail-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: var(--fg-muted);
      background: none; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 6px 12px; cursor: pointer; margin-bottom: 16px;
      transition: all 0.15s;
    }
    .detail-back:hover { border-color: var(--brand-700); color: var(--brand-700); }
    .detail-meta-row { display: flex; align-items: center; gap: 16px; margin-bottom: 6px; }
    .detail-order-id {
      font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--brand-700);
    }
    .detail-meta { font-size: 12px; color: var(--fg-muted); margin-bottom: 16px; }

    .detail-progress-bar-wrap {
      background: var(--success-bg); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 10px 16px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 14px;
    }
    .detail-progress-track {
      flex: 1; height: 6px; background: var(--success-bd); border-radius: 99px; overflow: hidden;
    }
    .detail-progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--brand-700), var(--success));
      transition: width 0.3s ease;
    }
    .detail-progress-label {
      font-size: 11px; font-weight: 700; color: var(--brand-700); white-space: nowrap;
    }

    /* Product table in detail view */
    .encargo-table {
      width: 100%; border-collapse: collapse;
      border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden;
    }
    .encargo-table thead th {
      background: var(--brand-700); color: white;
      padding: 8px 14px; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .encargo-table thead th:first-child { text-align: left; }
    .encargo-table thead th:not(:first-child) { text-align: center; width: 120px; }
    .encargo-table tbody tr { border-top: 1px solid var(--border); background: white; }
    .encargo-table tbody tr:nth-child(even) td { background: var(--surface-2); }
    .encargo-table tbody td { padding: 9px 14px; vertical-align: middle; }
    .encargo-table tbody td:not(:first-child) { text-align: center; }
    .encargo-prod-name { font-size: 13px; font-weight: 600; color: var(--fg-1); }
    .encargo-prod-code { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); font-weight: 700; margin-top: 1px; }

    .enc-check-cell {
      display: inline-flex; align-items: center; gap: 6px;
      cursor: pointer; user-select: none; padding: 4px 8px;
      border-radius: var(--radius); transition: background 0.1s;
    }
    .enc-check-cell:hover { background: var(--success-bg); }
    .enc-check-cell input[type="checkbox"] { display: none; }
    .enc-check-icon {
      width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0; transition: all 0.15s; background: white;
    }
    .enc-check-cell.recibido .enc-check-icon { background: var(--success); border-color: var(--success); color: white; }
    .enc-check-qty { font-size: 12px; font-weight: 700; color: var(--fg-muted); }
    .enc-check-cell.recibido .enc-check-qty { color: var(--success-fg); }
    .enc-check-cell.na { opacity: 0.25; cursor: default; pointer-events: none; }

    @media (max-width: 768px) {
      .detail-wrap { padding: 14px 14px 32px; }
      .encargo-table thead th:not(:first-child) { width: 90px; }
    }
  </style>
</head>
<body>
<div class="app-shell">

<!-- ── TOPBAR ── -->
<header class="topbar">
  <div class="brand">
    <div class="mark">
      <img src="{{ url_for('static', filename='img/monogram.svg') }}" alt="">
    </div>
    Barris &amp; Zarzuelo
  </div>
  <div class="divider"></div>
  <nav class="tabs">
    <a class="tab" href="/">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      Inicio
    </a>
    <a class="tab" href="/facturas">
      <svg viewBox="0 0 24 24"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2"/><path d="M16 8H8M16 12H8M13 16H8"/></svg>
      Facturas
    </a>
    <a class="tab on" href="/encargos">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Encargos
    </a>
  </nav>
  <div class="right">
    <a class="logout" href="/logout">Cerrar sesión</a>
  </div>
</header>

<!-- ── LIST VIEW ── -->
<div id="listView">
  <div style="padding:24px 24px 0">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:22px">
      <div>
        <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.01em;margin:0;color:var(--fg-1)" id="pageTitle">Encargos</h1>
        <p style="font-size:13px;color:var(--fg-muted);margin:4px 0 0" id="pageSubtitle"></p>
      </div>
    </div>

    <div class="filter-bar">
      <div class="radio-group" id="filterGroup">
        <label class="radio-opt on" data-filter="todos">
          <span class="radio-dot"></span>Todos
        </label>
        <label class="radio-opt" data-filter="pendiente">
          <span class="radio-dot"></span>Pendientes
        </label>
        <label class="radio-opt" data-filter="parcial">
          <span class="radio-dot"></span>Parciales
        </label>
        <label class="radio-opt" data-filter="completado">
          <span class="radio-dot"></span>Completados
        </label>
      </div>
      <div class="spacer"></div>
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="searchInput" placeholder="Buscar laboratorio o ID">
      </div>
    </div>
  </div>

  <div class="table-wrap" style="margin:16px 24px 0">
    <table class="data" id="encargoTable">
      <thead>
        <tr>
          <th style="width:100px">ID</th>
          <th>Laboratorio</th>
          <th>Farmacias</th>
          <th>Fecha</th>
          <th class="col-num">Productos</th>
          <th class="col-num">Uds</th>
          <th>Estado</th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody id="encargoList"></tbody>
    </table>
  </div>
  <div id="emptyState" class="enc-empty-state" style="display:none">
    <strong>No hay encargos registrados</strong>
    Confirma un pedido desde la comparativa para que aparezca aquí.
  </div>
</div>

<!-- ── DETAIL VIEW ── -->
<div id="detailView" style="display:none">
  <div class="detail-wrap">
    <button class="detail-back" onclick="showList()">← Todos los encargos</button>

    <div class="detail-meta-row">
      <div class="detail-order-id" id="detailOrderId"></div>
      <div style="display:flex;align-items:center;gap:10px">
        <button id="detailPdfBtn" class="enc-pdf-btn" onclick="downloadDetailPdf()">PDF</button>
        <div id="detailStatusBadge"></div>
      </div>
    </div>
    <div class="detail-meta" id="detailMeta"></div>

    <div class="detail-pending-summary" id="detailPending"></div>
    <div id="detailProducts"></div>
  </div>
</div>

</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let encargos = [];
let currentEncargoIdx = null;
let activeFilter = 'todos';
let searchTerm = '';

function loadEncargos() {
  try {
    const s = localStorage.getItem('encargos');
    if (s) encargos = JSON.parse(s);
  } catch(e) { encargos = []; }
}

function persistEncargos() {
  try { localStorage.setItem('encargos', JSON.stringify(encargos)); } catch(e) {}
}

// ─── PDF ─────────────────────────────────────────────────────────────────────
async function downloadDetailPdf() {
  if (currentEncargoIdx === null) return;
  const enc = encargos[currentEncargoIdx];
  if (enc.pdf_id) {
    window.open('/pedido_file/' + enc.pdf_id, '_blank');
    return;
  }
  const btn = document.getElementById('detailPdfBtn');
  btn.textContent = '...'; btn.disabled = true;
  const rows = (enc.products || []).map(p => ({
    code: p.codigo, desc: p.descripcion,
    qz:  p.pedido_zarzuelo || 0,
    qb:  p.pedido_barris   || 0,
    tot: p.pedido_total    || (p.pedido_zarzuelo || 0) + (p.pedido_barris || 0),
  }));
  try {
    const resp = await fetch('/pedido_pdf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lab: enc.lab, name1: enc.name1, name2: enc.name2, rows }),
    });
    if (resp.ok) {
      const blob = await resp.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = `pedido_${enc.order_id}.pdf`;
      a.click(); URL.revokeObjectURL(url);
    }
  } catch(e) {}
  btn.textContent = 'PDF'; btn.disabled = false;
}

// ─── STATUS ───────────────────────────────────────────────────────────────────
function calcStatus(enc) {
  let expected = 0, received = 0;
  (enc.products || []).forEach(p => {
    if ((p.pedido_zarzuelo || 0) > 0) { expected++; if (p.recibido_zarzuelo) received++; }
    if ((p.pedido_barris   || 0) > 0) { expected++; if (p.recibido_barris)   received++; }
  });
  if (expected === 0 || received === 0) return 'pendiente';
  if (received >= expected) return 'completado';
  return 'parcial';
}

function statusBadgeHTML(status) {
  const map = {
    pendiente:  { cls: 'badge-pending',  dot: 'var(--warning)', label: 'Pendiente' },
    parcial:    { cls: 'badge-partial',  dot: 'var(--partial)', label: 'Parcial' },
    completado: { cls: 'badge-completed',dot: 'var(--success)', label: 'Completado' },
  };
  const m = map[status] || map.pendiente;
  return `<span class="badge ${m.cls}"><span class="d" style="width:5px;height:5px;border-radius:50%;background:${m.dot}"></span>${m.label}</span>`;
}

// ─── LIST VIEW ────────────────────────────────────────────────────────────────
function renderList() {
  const tbody = document.getElementById('encargoList');
  const empty = document.getElementById('emptyState');

  if (encargos.length === 0) {
    tbody.innerHTML = '';
    document.querySelector('#encargoTable').closest('.table-wrap').style.display = 'none';
    empty.style.display = '';
    return;
  }
  document.querySelector('#encargoTable').closest('.table-wrap').style.display = '';
  empty.style.display = 'none';

  const sorted = encargos.map((e, i) => ({ ...e, _idx: i })).slice().reverse();

  const filtered = sorted.filter(enc => {
    const status = calcStatus(enc);
    if (activeFilter !== 'todos' && status !== activeFilter) return false;
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      const lab = (enc.lab || '').toLowerCase();
      const id = (enc.order_id || '').toLowerCase();
      if (!lab.includes(q) && !id.includes(q)) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--fg-muted)">Sin resultados</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(enc => {
    const status   = calcStatus(enc);
    const nProds   = (enc.products || []).length;
    const totalUds = (enc.products || []).reduce((s, p) =>
      s + (p.pedido_total || (p.pedido_zarzuelo || 0) + (p.pedido_barris || 0)), 0);
    const name1 = enc.name1 || '';
    const name2 = enc.name2 || '';
    const pharmacies = [name1, name2].filter(Boolean).join(' · ');
    return `
      <tr onclick="showDetail(${enc._idx})" style="cursor:pointer">
        <td><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-muted)">${enc.order_id}</span></td>
        <td><div style="font-weight:600">${enc.lab || 'Sin laboratorio'}</div><div style="font-size:11px;color:var(--fg-muted)">${enc.date}</div></td>
        <td><div style="font-size:12px;color:var(--fg-muted)">${pharmacies}</div></td>
        <td><div style="font-size:12px">${enc.date}</div></td>
        <td class="col-num">${nProds}</td>
        <td class="col-num">${totalUds}</td>
        <td>${statusBadgeHTML(status)}</td>
        <td class="col-actions"><div class="row-actions">
          ${enc.pdf_id ? `<a class="enc-pdf-btn" href="/pedido_file/${enc.pdf_id}" target="_blank" onclick="event.stopPropagation()" title="Ver PDF">PDF</a>` : ''}
        </div></td>
      </tr>`;
  }).join('');
}

function updatePageMeta() {
  const count = encargos.length;
  document.getElementById('pageTitle').textContent    = 'Encargos';
  document.getElementById('pageSubtitle').textContent = count + ' pedido' + (count !== 1 ? 's' : '') + ' en total';
}

function showList() {
  currentEncargoIdx = null;
  document.getElementById('listView').style.display   = '';
  document.getElementById('detailView').style.display = 'none';
  updatePageMeta();
  renderList();
}

// ─── FILTER BAR ───────────────────────────────────────────────────────────────
document.getElementById('filterGroup').addEventListener('click', e => {
  const opt = e.target.closest('.radio-opt');
  if (!opt) return;
  document.querySelectorAll('#filterGroup .radio-opt').forEach(o => o.classList.remove('on'));
  opt.classList.add('on');
  activeFilter = opt.dataset.filter;
  renderList();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  renderList();
});

// ─── DETAIL VIEW ──────────────────────────────────────────────────────────────
function showDetail(idx) {
  currentEncargoIdx = idx;
  document.getElementById('listView').style.display   = 'none';
  document.getElementById('detailView').style.display = '';
  renderDetail(idx);
}

function renderDetail(idx) {
  const enc    = encargos[idx];
  const status = calcStatus(enc);

  document.getElementById('detailOrderId').textContent = enc.order_id;
  document.getElementById('detailStatusBadge').innerHTML = statusBadgeHTML(status);
  document.getElementById('detailPdfBtn').style.display = '';
  document.getElementById('detailMeta').textContent =
    (enc.name1 || 'Farm. 1') + ' vs ' + (enc.name2 || 'Farm. 2') +
    ' · ' + (enc.products || []).length + ' productos · ' + enc.date;

  renderPendingSummary(enc);
  renderDetailProducts(idx);
}

function renderPendingSummary(enc) {
  const container = document.getElementById('detailPending');
  let expected = 0, received = 0;
  (enc.products || []).forEach(p => {
    if ((p.pedido_zarzuelo || 0) > 0) { expected++; if (p.recibido_zarzuelo) received++; }
    if ((p.pedido_barris   || 0) > 0) { expected++; if (p.recibido_barris)   received++; }
  });
  const pct = expected > 0 ? Math.round(received / expected * 100) : 100;
  const label = expected === 0 ? 'Sin entregas' : received >= expected ? 'Todo recibido' : `${received} / ${expected} recibidos`;
  container.innerHTML = `
    <div class="detail-progress-bar-wrap">
      <div class="detail-progress-track">
        <div class="detail-progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="detail-progress-label">${label}</div>
    </div>`;
}

function renderDetailProducts(idx) {
  const enc       = encargos[idx];
  const container = document.getElementById('detailProducts');
  const name1 = enc.name1 || 'Farm. 1';
  const name2 = enc.name2 || 'Farm. 2';

  const rows = (enc.products || []).map((p, pIdx) => {
    const hasZ = (p.pedido_zarzuelo || 0) > 0;
    const hasB = (p.pedido_barris   || 0) > 0;

    const cellZ = hasZ
      ? `<div class="enc-check-cell${p.recibido_zarzuelo ? ' recibido' : ''}"
              id="chk-wrap-${idx}-${pIdx}-z"
              onclick="onCheckboxChange(${idx},${pIdx},'z')">
           <input type="checkbox" ${p.recibido_zarzuelo ? 'checked' : ''}>
           <div class="enc-check-icon">${p.recibido_zarzuelo ? '&#10003;' : ''}</div>
           <span class="enc-check-qty">${p.pedido_zarzuelo} uds</span>
         </div>`
      : `<div class="enc-check-cell na"><div class="enc-check-icon"></div><span class="enc-check-qty">—</span></div>`;

    const cellB = hasB
      ? `<div class="enc-check-cell${p.recibido_barris ? ' recibido' : ''}"
              id="chk-wrap-${idx}-${pIdx}-b"
              onclick="onCheckboxChange(${idx},${pIdx},'b')">
           <input type="checkbox" ${p.recibido_barris ? 'checked' : ''}>
           <div class="enc-check-icon">${p.recibido_barris ? '&#10003;' : ''}</div>
           <span class="enc-check-qty">${p.pedido_barris} uds</span>
         </div>`
      : `<div class="enc-check-cell na"><div class="enc-check-icon"></div><span class="enc-check-qty">—</span></div>`;

    return `
      <tr>
        <td><div class="encargo-prod-name">${p.descripcion}</div><div class="encargo-prod-code">${p.codigo}</div></td>
        <td>${cellZ}</td>
        <td>${cellB}</td>
      </tr>`;
  }).join('');

  container.innerHTML = `
    <table class="encargo-table">
      <thead><tr>
        <th>Producto</th>
        <th>${name1}</th>
        <th>${name2}</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ─── CHECKBOX ─────────────────────────────────────────────────────────────────
function onCheckboxChange(eIdx, pIdx, side) {
  const enc = encargos[eIdx];
  if (!enc || !enc.products[pIdx]) return;
  const isZ = side === 'z';
  const newVal = isZ ? !enc.products[pIdx].recibido_zarzuelo : !enc.products[pIdx].recibido_barris;
  if (isZ) enc.products[pIdx].recibido_zarzuelo = newVal;
  else     enc.products[pIdx].recibido_barris   = newVal;
  enc.status = calcStatus(enc);
  persistEncargos();
  const wrapId = 'chk-wrap-' + eIdx + '-' + pIdx + '-' + side;
  const wrap   = document.getElementById(wrapId);
  if (wrap) {
    wrap.classList.toggle('recibido', newVal);
    const icon = wrap.querySelector('.enc-check-icon');
    if (icon) icon.innerHTML = newVal ? '&#10003;' : '';
  }
  document.getElementById('detailStatusBadge').innerHTML = statusBadgeHTML(enc.status);
  renderPendingSummary(enc);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadEncargos();
showList();
</script>
</body>
</html>
