<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Warehouse Loader Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: #f0fdf4;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

.loader-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

/* SVG scene */
#scene {
  width: 320px;
  height: 220px;
  overflow: visible;
}

/* ── Rail (dashed horizontal line at top) ───────────────── */
.rail {
  stroke: #1e3a5f;
  stroke-width: 2;
  stroke-dasharray: 6 5;
  fill: none;
}

/* ── Crane trolley (slides along rail) ─────────────────── */
.trolley {
  animation: trolley-move 3.2s cubic-bezier(0.45, 0, 0.55, 1) infinite;
}
@keyframes trolley-move {
  0%   { transform: translateX(0px);   }
  40%  { transform: translateX(180px); }
  60%  { transform: translateX(180px); }
  100% { transform: translateX(0px);   }
}

/* ── Crane cable (extends / retracts) ───────────────────── */
.cable {
  stroke: #1e3a5f;
  stroke-width: 1.5;
  stroke-linecap: round;
  animation: cable-extend 3.2s cubic-bezier(0.45, 0, 0.55, 1) infinite;
  transform-origin: 50% 0%;
}
@keyframes cable-extend {
  0%   { transform: scaleY(1);   }
  30%  { transform: scaleY(1);   }
  40%  { transform: scaleY(2.6); }
  60%  { transform: scaleY(2.6); }
  70%  { transform: scaleY(1);   }
  100% { transform: scaleY(1);   }
}

/* ── Hook ───────────────────────────────────────────────── */
.hook-group {
  animation: hook-move 3.2s cubic-bezier(0.45, 0, 0.55, 1) infinite;
}
@keyframes hook-move {
  0%   { transform: translateX(0px)   translateY(0px);  }
  30%  { transform: translateX(0px)   translateY(0px);  }
  40%  { transform: translateX(0px)   translateY(46px); }
  60%  { transform: translateX(0px)   translateY(46px); }
  70%  { transform: translateX(0px)   translateY(0px);  }
  100% { transform: translateX(0px)   translateY(0px);  }
}

/* ── Grabbed box (rides with hook from right position) ──── */
.grabbed-box {
  animation: grabbed-box-move 3.2s cubic-bezier(0.45, 0, 0.55, 1) infinite;
  opacity: 0;
}
@keyframes grabbed-box-move {
  0%   { transform: translateX(180px) translateY(46px); opacity: 0; }
  39%  { transform: translateX(180px) translateY(46px); opacity: 0; }
  40%  { transform: translateX(180px) translateY(46px); opacity: 1; }
  60%  { transform: translateX(180px) translateY(46px); opacity: 1; }
  61%  { transform: translateX(0px)   translateY(0px);  opacity: 0; }
  100% { transform: translateX(0px)   translateY(0px);  opacity: 0; }
}

/* ── Conveyor belt base ─────────────────────────────────── */
.belt-base {
  fill: none;
  stroke: #1e3a5f;
  stroke-width: 2;
}
.belt-roller {
  fill: none;
  stroke: #1e3a5f;
  stroke-width: 2;
}

/* ── Belt surface lines (moving) ───────────────────────── */
.belt-line {
  stroke: #4a7fa5;
  stroke-width: 1.5;
  stroke-linecap: round;
  animation: belt-scroll 1.1s linear infinite;
}
@keyframes belt-scroll {
  from { transform: translateX(0px);  }
  to   { transform: translateX(22px); }
}

/* ── Conveyor boxes ─────────────────────────────────────── */
.conv-box {
  animation: conv-scroll 2.4s linear infinite;
}
.conv-box:nth-child(1) { animation-delay: 0s;    }
.conv-box:nth-child(2) { animation-delay: -0.8s; }
.conv-box:nth-child(3) { animation-delay: -1.6s; }

@keyframes conv-scroll {
  from { transform: translateX(0px);   }
  to   { transform: translateX(-180px); }
}

/* ── Warehouse building outline ─────────────────────────── */
.building {
  fill: none;
  stroke: #1e3a5f;
  stroke-width: 1.8;
  stroke-linejoin: round;
}
.building-door {
  fill: #dbeafe;
  stroke: #1e3a5f;
  stroke-width: 1.5;
}
.building-window {
  fill: #dbeafe;
  stroke: #1e3a5f;
  stroke-width: 1.2;
}

/* ── LOADING text ───────────────────────────────────────── */
.loading-text {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.35em;
  color: #1e3a5f;
  text-transform: uppercase;
  animation: text-pulse 2s ease-in-out infinite;
}
@keyframes text-pulse {
  0%, 100% { letter-spacing: 0.35em; opacity: 0.7; }
  50%       { letter-spacing: 0.5em;  opacity: 1;   }
}

/* ── Dots after LOADING ─────────────────────────────────── */
.dot {
  display: inline-block;
  animation: dot-blink 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
.dot:nth-child(4) { animation-delay: 0.6s; }

@keyframes dot-blink {
  0%, 80%, 100% { opacity: 0; }
  40%           { opacity: 1; }
}

/* ── Progress bar (optional, matches green palette) ─────── */
.progress-track {
  width: 200px;
  height: 3px;
  background: #d1fae5;
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill-demo {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #166534, #16a34a, #4ade80);
  border-radius: 99px;
  animation: prog-demo 3.2s ease-in-out infinite;
}
@keyframes prog-demo {
  0%   { width: 0%; }
  80%  { width: 85%; }
  100% { width: 85%; }
}
</style>
</head>
<body>

<div class="loader-wrap">

  <svg id="scene" viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">

    <!-- ══ WAREHOUSE BUILDING (background) ══ -->
    <!-- Main structure -->
    <rect class="building" x="30" y="100" width="100" height="85" rx="2"/>
    <!-- Roof peak -->
    <polyline class="building" points="22,100 80,70 138,100"/>
    <!-- Door -->
    <rect class="building-door" x="58" y="142" width="28" height="43" rx="2"/>
    <!-- Window -->
    <rect class="building-window" x="94" y="115" width="24" height="18" rx="2"/>
    <!-- Roof cross beam -->
    <line class="building" x1="30" y1="100" x2="130" y2="100"/>

    <!-- ══ CRANE STRUCTURE (fixed vertical columns) ══ -->
    <!-- Left column -->
    <line stroke="#1e3a5f" stroke-width="2.5" x1="60" y1="185" x2="60" y2="28"/>
    <!-- Right column (off-scene right) -->
    <line stroke="#1e3a5f" stroke-width="2.5" x1="275" y1="185" x2="275" y2="28"/>
    <!-- Base supports -->
    <line stroke="#1e3a5f" stroke-width="2" x1="52" y1="185" x2="68" y2="185"/>
    <line stroke="#1e3a5f" stroke-width="2" x1="267" y1="185" x2="283" y2="185"/>

    <!-- ══ RAIL ══ -->
    <line class="rail" x1="60" y1="28" x2="275" y2="28"/>

    <!-- ══ CRANE (trolley + cable + hook) — origin at left column ══ -->
    <g class="trolley">
      <!-- Trolley body -->
      <rect fill="#1e3a5f" x="51" y="20" width="18" height="10" rx="2"/>
      <!-- Trolley wheels -->
      <circle fill="#4a7fa5" cx="55" cy="20" r="3"/>
      <circle fill="#4a7fa5" cx="65" cy="20" r="3"/>

      <!-- Cable -->
      <line class="cable" x1="60" y1="30" x2="60" y2="52"/>

      <!-- Hook group (moves down with cable) -->
      <g class="hook-group">
        <!-- Hook body -->
        <rect fill="none" stroke="#1e3a5f" stroke-width="1.8" x="53" y="52" width="14" height="8" rx="2"/>
        <!-- Hook jaw -->
        <path fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"
              d="M53,60 Q50,66 56,66 Q62,66 67,60"/>
      </g>
    </g>

    <!-- ══ GRABBED BOX (appears when hook is low, rides back) ══ -->
    <g class="grabbed-box">
      <!-- Orange box being lifted -->
      <rect fill="#fed7aa" stroke="#f97316" stroke-width="2" x="170" y="60" width="22" height="18" rx="2"/>
      <!-- Box cross lines -->
      <line stroke="#f97316" stroke-width="1" x1="170" y1="69" x2="192" y2="69"/>
      <line stroke="#f97316" stroke-width="1" x1="181" y1="60" x2="181" y2="78"/>
    </g>

    <!-- ══ CONVEYOR BELT ══ -->
    <!-- Belt surface (clipped) -->
    <clipPath id="belt-clip">
      <rect x="130" y="155" width="162" height="20"/>
    </clipPath>

    <!-- Moving belt lines -->
    <g clip-path="url(#belt-clip)">
      <g class="belt-line">
        <line x1="130" y1="162" x2="130" y2="168"/>
        <line x1="152" y1="162" x2="152" y2="168"/>
        <line x1="174" y1="162" x2="174" y2="168"/>
        <line x1="196" y1="162" x2="196" y2="168"/>
        <line x1="218" y1="162" x2="218" y2="168"/>
        <line x1="240" y1="162" x2="240" y2="168"/>
        <line x1="262" y1="162" x2="262" y2="168"/>
        <line x1="284" y1="162" x2="284" y2="168"/>
        <line x1="306" y1="162" x2="306" y2="168"/>
      </g>
    </g>

    <!-- Belt outline -->
    <rect class="belt-base" x="130" y="155" width="162" height="20" rx="3"/>
    <!-- Belt rollers -->
    <circle class="belt-roller" cx="133" cy="165" r="8"/>
    <circle class="belt-roller" cx="289" cy="165" r="8"/>
    <!-- Belt legs -->
    <line stroke="#1e3a5f" stroke-width="2" x1="150" y1="175" x2="150" y2="190"/>
    <line stroke="#1e3a5f" stroke-width="2" x1="270" y1="175" x2="270" y2="190"/>
    <!-- Leg feet -->
    <line stroke="#1e3a5f" stroke-width="2" x1="144" y1="190" x2="156" y2="190"/>
    <line stroke="#1e3a5f" stroke-width="2" x1="264" y1="190" x2="276" y2="190"/>

    <!-- ══ BOXES ON BELT ══ -->
    <!-- Clip boxes to belt surface -->
    <clipPath id="box-clip">
      <rect x="141" y="130" width="140" height="26"/>
    </clipPath>
    <g clip-path="url(#box-clip)">

      <!-- Box 1 -->
      <g class="conv-box">
        <rect fill="#fed7aa" stroke="#f97316" stroke-width="1.8" x="230" y="135" width="22" height="18" rx="2"/>
        <line stroke="#f97316" stroke-width="1" x1="230" y1="144" x2="252" y2="144"/>
        <line stroke="#f97316" stroke-width="1" x1="241" y1="135" x2="241" y2="153"/>
      </g>

      <!-- Box 2 -->
      <g class="conv-box">
        <rect fill="#fed7aa" stroke="#f97316" stroke-width="1.8" x="290" y="135" width="22" height="18" rx="2"/>
        <line stroke="#f97316" stroke-width="1" x1="290" y1="144" x2="312" y2="144"/>
        <line stroke="#f97316" stroke-width="1" x1="301" y1="135" x2="301" y2="153"/>
      </g>

      <!-- Box 3 -->
      <g class="conv-box">
        <rect fill="#fed7aa" stroke="#f97316" stroke-width="1.8" x="350" y="135" width="22" height="18" rx="2"/>
        <line stroke="#f97316" stroke-width="1" x1="350" y1="144" x2="372" y2="144"/>
        <line stroke="#f97316" stroke-width="1" x1="361" y1="135" x2="361" y2="153"/>
      </g>
    </g>

    <!-- ══ GROUND LINE ══ -->
    <line stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="4 6" x1="20" y1="196" x2="305" y2="196"/>

  </svg>

  <!-- Text -->
  <div class="loading-text">
    CARGANDO
    <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>

  <!-- Progress bar -->
  <div class="progress-track">
    <div class="progress-fill-demo"></div>
  </div>

</div>

</body>
</html>
